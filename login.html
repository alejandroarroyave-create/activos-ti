<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - Activos TI</title>
    <link rel="stylesheet" href="styles.css">
    <!-- QR Code Library Cargada Primero -->
    <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #ff6b57;
            --primary-dark: #e85a47;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }
        
        body { 
            display: grid; 
            place-items: center; 
            min-height: 100dvh; 
            background: var(--bg);
            margin: 0; 
            font-family: 'Outfit', 'Inter', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        .background-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(at 0% 0%, rgba(255, 107, 87, 0.15) 0px, transparent 50%),
                        radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
        }

        /* Efecto de orbes flotantes más sutiles */
        .orb {
            position: absolute;
            width: 600px;
            height: 600px;
            filter: blur(140px);
            border-radius: 50%;
            opacity: 0.15; /* Menos brillante */
            z-index: 2;
        }

        /* Estilos para las ondas inferiores */
        .waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15vh;
            margin-bottom: -7px; /* Fix para gaps en algunos navegadores */
            min-height: 100px;
            max-height: 150px;
            z-index: 1;
            opacity: 0.3;
        }

        .parallax > use {
            animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
        }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }

        @keyframes move-forever {
            0% { transform: translate3d(-90px,0,0); }
            100% { transform: translate3d(85px,0,0); }
        }

        .orb-1 {
            background: radial-gradient(circle, var(--primary), transparent);
            top: -10%;
            left: -10%;
            animation: float1 15s infinite alternate ease-in-out;
        }

        .orb-2 {
            background: radial-gradient(circle, #3b82f6, transparent);
            bottom: -10%;
            right: -10%;
            animation: float2 18s infinite alternate ease-in-out;
        }

        @keyframes float1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.1); }
        }

        @keyframes float2 {
            0% { transform: translate(0, 0) scale(1.1); }
            100% { transform: translate(-80px, -60px) scale(1); }
        }

        .login-card { 
            width: 100%; 
            max-width: 440px; 
            padding: 48px; 
            background: rgba(30, 41, 59, 0.7);
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }

        .brand-container {
            margin-bottom: 40px;
            text-align: center;
        }
        
        .brand-logo-img {
            width: auto;
            height: 50px;
            max-width: 200px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255, 107, 87, 0.2));
            display: inline-block;
        }

        h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin: 0; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: var(--text-dim); font-size: 16px; margin-top: 10px; }

        .form { margin-top: 32px; }
        .form label { display: block; font-size: 13px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        
        .input-group { position: relative; margin-bottom: 24px; }
        
        .form input { 
            width: 100%; 
            padding: 14px 18px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(15, 23, 42, 0.6); 
            color: white;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(255, 107, 87, 0.15);
        }

        .btn-primary { 
            width: 100%; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s;
            box-shadow: 0 10px 20px -5px rgba(255, 107, 87, 0.4);
            margin-top: 10px;
        }

        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(255, 107, 87, 0.5);
            filter: brightness(1.1);
        }

        .btn-primary:active { transform: translateY(0); }
        .hidden { display: none !important; }

        /* Estilo para el mensaje de cambio de clave */
        #passMessage {
            background: rgba(255, 107, 87, 0.1);
            border-left: 4px solid var(--primary);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: var(--primary);
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 20px;
                margin: 0;
                border-radius: 28px;
                width: 90%;
            }
            .brand-container { margin-bottom: 24px; }
            .brand-logo-img { height: 38px; }
            h2 { font-size: 24px; }
            .waves {
                height: 18vh;
                min-height: 140px;
                opacity: 0.5;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="login-card">
        <div class="brand-container">
            <img src="logo.png" alt="Dataico" class="brand-logo-img">
            <h2 id="loginTitle">Gestión de Activos</h2>
            <p id="loginSubtitle">Ingresa tus credenciales para continuar</p>
        </div>

        <form id="loginForm" class="form">
            <label>Correo o Usuario</label>
            <input type="text" id="userInput" placeholder="ejemplo@correo.com" required>
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="submit" class="btn-primary">Entrar al Sistema</button>
        </form>

        <div id="changePassSection" class="hidden">
            <div id="passMessage"></div>
            <form id="changePassForm" class="form">
                <label>Nueva Contraseña</label>
                <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
                <label>Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required minlength="6">
                
                <div id="mfaRecoveryContainer" class="hidden" style="margin-bottom:20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
                    <label style="color: var(--primary); margin-bottom: 12px;">Código 2FA Requerido:</label>
                    <input type="text" id="mfaRecoveryCode" maxlength="6" style="text-align:center; font-size:24px; letter-spacing:8px; background: rgba(0,0,0,0.3);" placeholder="000000">
                </div>
                
                <button type="submit" class="btn-primary">Actualizar y Entrar</button>
            </form>
        </div>

        <div id="setupMfaSection" class="hidden text-center">
            <h3 style="font-size:18px;">Vincular Google Authenticator</h3>
            <p style="font-size:13px; color:#4b5563;">Escanea el código QR desde tu celular:</p>
            <!-- Usamos imagen directa para estirilidad total -->
            <div style="background: white; padding: 10px; display: inline-block; border-radius: 8px; margin: 15px auto; border: 1px solid #ddd;">
                <img id="qrImage" style="display: block; width: 200px; height: 200px;" alt="Código QR de Seguridad">
            </div>
            <form id="setupMfaForm" class="form">
                <input type="text" id="setupMfaCode" required maxlength="6" style="text-align:center; font-size:24px; letter-spacing:4px;" placeholder="000000">
                <button type="submit" class="btn-primary" style="width:100%;">Confirmar Vinculación</button>
            </form>
        </div>

        <div id="mfaSection" class="hidden text-center">
            <h3 style="font-size: 22px; margin-bottom: 12px;">Verificación de Identidad</h3>
            <p style="margin-bottom: 30px;">Ingresa el código de 6 dígitos de tu aplicación Authenticator para continuar.</p>
            <form id="mfaForm" class="form">
                <input type="text" id="mfaCode" required maxlength="6" style="text-align:center; font-size:32px; letter-spacing:12px; background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.1); color: var(--primary); font-weight: 700;" placeholder="000000">
                <button type="submit" class="btn-primary">Verificar y Acceder</button>
            </form>
        </div>
    </div>

    <!-- SVG de ondas animadas -->
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
    <defs>
    <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
    </defs>
    <g class="parallax">
    <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(255,255,255,0.05)" />
    <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(255,255,255,0.05)" />
    <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(255,255,255,0.05)" />
    <use xlink:href="#gentle-wave" x="48" y="7" fill="#ff6b57" opacity="0.1" />
    </g>
    </svg>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        (async function() {
            const sURL = 'https://hsczygcbmtyzkzeksajm.supabase.co', sKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzY3p5Z2NibXR5emt6ZWtzYWptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Nzk0NDksImV4cCI6MjA5MTI1NTQ0OX0.YetS-bD8wd_ZsLjeEhO_9ZsrlnxHd-MVPcC0iQS5EF0';
            const supabase = window.supabase.createClient(sURL, sKEY);
            let gFactorId = null;

            // DETECCIÓN ROBUSTA DE RECUPERACIÓN / SESIÓN
            supabase.auth.onAuthStateChange(async (event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    showSection('changePassSection');
                    document.getElementById('passMessage').textContent = "🔄 Restaurando contraseña desde correo...";
                    
                    const { data: factors } = await supabase.auth.mfa.listFactors();
                    if (factors && factors.all.length > 0) {
                        document.getElementById('mfaRecoveryContainer').classList.remove('hidden');
                        document.getElementById('mfaRecoveryCode').required = true;
                    }
                } else if (event === 'SIGNED_IN' && session) {
                    handleSecurityFlow(session);
                }
            });

            document.getElementById('loginForm').onsubmit = async (e) => {
                e.preventDefault();
                let uVal = document.getElementById('userInput').value;
                const pass = document.getElementById('password').value;

                if(uVal === 'admin' && pass === '123') {
                    localStorage.setItem('test_bypass', 'true');
                    location.href = 'index.html'; return;
                }

                let finalEmail = uVal;
                if (!uVal.includes('@')) {
                    const { data: p, error: pe } = await supabase.from('perfiles').select('email').eq('usuario', uVal).single();
                    if (pe || !p) return alert("Usuario no encontrado.");
                    finalEmail = p.email;
                }

                const { data, error } = await supabase.auth.signInWithPassword({ email: finalEmail, password: pass });
                if(error) return alert("Error: " + error.message);
                // Si llegamos aquí sin errores, onAuthStateChange se encargará del resto
            };

            async function handleSecurityFlow(session) {
                const { data: prof } = await supabase.from('perfiles').select('debe_cambiar_clave').eq('id', session.user.id).single();
                if (prof && prof.debe_cambiar_clave) { showSection('changePassSection'); return; }

                const { data: mfa } = await supabase.auth.mfa.getAuthenticatorAssuranceLevel();
                if (mfa.nextLevel === 'aal2' && mfa.currentLevel === 'aal1') { showSection('mfaSection'); }
                else if (mfa.nextLevel === 'aal1' && mfa.currentLevel === 'aal1') { enrollMFA(); }
                else { location.href = 'index.html'; }
            }

            function showSection(id) {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('changePassSection').classList.add('hidden');
                document.getElementById('setupMfaSection').classList.add('hidden');
                document.getElementById('mfaSection').classList.add('hidden');
                document.getElementById(id).classList.remove('hidden');
            }

            document.getElementById('changePassForm').onsubmit = async (e) => {
                e.preventDefault();
                if(document.getElementById('newPassword').value !== document.getElementById('confirmPassword').value) {
                    return alert("Las contraseñas no coinciden.");
                }
                
                const mfaContainer = document.getElementById('mfaRecoveryContainer');
                if (!mfaContainer.classList.contains('hidden')) {
                    const code = document.getElementById('mfaRecoveryCode').value;
                    const { data: factors } = await supabase.auth.mfa.listFactors();
                    if (factors && factors.all.length > 0) {
                        const factor = factors.all[0];
                        const { data: cData, error: cErr } = await supabase.auth.mfa.challenge({ factorId: factor.id });
                        if(cErr) return alert(cErr.message);
                        const { error: vErr } = await supabase.auth.mfa.verify({ factorId: factor.id, challengeId: cData.id, code });
                        if(vErr) return alert("Código 2FA incorrecto.");
                    }
                }

                const np = document.getElementById('newPassword').value;
                const { error } = await supabase.auth.updateUser({ password: np });
                if(error) return alert(error.message);
                
                const { data: { user } } = await supabase.auth.getUser();
                if (user) await supabase.from('perfiles').update({ debe_cambiar_clave: false }).eq('id', user.id);
                
                alert("¡Contraseña actualizada! Verifica ahora tu Authenticator.");
                location.reload();
            };

            async function enrollMFA() {
                try {
                    showSection('setupMfaSection');
                    
                    // LIMPIEZA AGRESIVA: Borramos CUALQUIER factor previo (verificado o no) para resetear el acceso
                    const { data: listData } = await supabase.auth.mfa.listFactors();
                    if (listData && listData.all.length > 0) {
                        for (const factor of listData.all) {
                            await supabase.auth.mfa.unenroll({ factorId: factor.id });
                        }
                        // Pequeña espera para que Supabase procese la limpieza
                        await new Promise(r => setTimeout(r, 500));
                    }

                    const { data, error } = await supabase.auth.mfa.enroll({ 
                        factorType: 'totp',
                        issuer: 'Activos TI Dataico',
                        friendlyName: (await supabase.auth.getUser()).data.user.email
                    });
                    if (error) throw error;
                    
                    gFactorId = data.id;
                    const uri = data.totp.uri;

                    // Mostrar QR usando la API infalible
                    const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(uri)}`;
                    document.getElementById('qrImage').src = qrApiUrl;
                    
                } catch (err) {
                    alert("Error al iniciar 2FA: " + err.message);
                }
            }

            document.getElementById('setupMfaForm').onsubmit = async (e) => {
                e.preventDefault();
                const code = document.getElementById('setupMfaCode').value;
                const { data: cData, error: cErr } = await supabase.auth.mfa.challenge({ factorId: gFactorId });
                if(cErr) return alert(cErr.message);
                const { error } = await supabase.auth.mfa.verify({ factorId: gFactorId, challengeId: cData.id, code });
                if(error) return alert("Código inválido. Revisa tu aplicación.");
                location.href = 'index.html';
            };

            document.getElementById('mfaForm').onsubmit = async (e) => {
                e.preventDefault();
                const code = document.getElementById('mfaCode').value;
                const { data: factors } = await supabase.auth.mfa.listFactors();
                const factor = factors.all[0];
                const { data: cData, error: cErr } = await supabase.auth.mfa.challenge({ factorId: factor.id });
                if(cErr) return alert(cErr.message);
                const { error } = await supabase.auth.mfa.verify({ factorId: factor.id, challengeId: cData.id, code });
                if(error) return alert("Código incorrecto.");
                location.href = 'index.html';
            };
        })();
    </script>
</body>
</html>
